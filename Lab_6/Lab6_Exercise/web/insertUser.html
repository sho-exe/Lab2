<!DOCTYPE html>
<html>


    <head><title>Register New User</title>
        <style>
            
            
            * {
                 margin: 8px;
                
            }
            fieldset {
                 max-width: 400px;
            }

        </style>
    </head>
    <body>

        <fieldset>
            <legend><h2>User Registration</h2></legend>
            <form action="processUser.jsp" method="post">
                Username: <input type="text" name="username" required maxlength="15"><br>
                Password: <input type="password" name="password" required maxlength="10"><br>
                First Name: <input type="text" name="firstname"><br>
                Last Name: <input type="text" name="lastname"><br>
                <input type="submit" value="Register">
            </form>
            <a href="login.jsp">Login</a>

        </fieldset>


    </body>
</html>
